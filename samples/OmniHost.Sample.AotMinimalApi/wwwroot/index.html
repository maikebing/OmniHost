<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NativeAOT Minimal API Sample</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: rgba(255,255,255,0.92);
      --border: rgba(15, 23, 42, 0.08);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0f766e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15,118,110,0.14), transparent 24%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      padding: 24px;
    }

    .shell {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .panel {
      padding: 22px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: 0 18px 44px rgba(15,23,42,0.08);
    }

    .hero {
      display: grid;
      gap: 12px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(15,118,110,0.1);
      color: var(--accent);
      font-size: .82rem;
      font-weight: 700;
    }

    h1, h2, p {
      margin: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
    }

    button {
      width: fit-content;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: linear-gradient(135deg, var(--accent), #14b8a6);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    pre {
      margin: 0;
      padding: 14px;
      border-radius: 16px;
      background: rgba(15,23,42,0.04);
      border: 1px solid rgba(15,23,42,0.06);
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: .82rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <span class="eyebrow">NativeAOT-friendly sample</span>
      <h1>Minimal API + static page.</h1>
      <p>
        这个样例故意保持简单：最小 API、静态 HTML、typed JSON source generation。
        如果你后面要把后端编译成 NativeAOT，这是比 MVC / Blazor 更稳的起点。
      </p>
      <button id="reload">Reload APIs</button>
    </section>

    <section class="panel">
      <h2>/api/status</h2>
      <pre id="status">Loading...</pre>
    </section>

    <section class="panel">
      <h2>/api/todos</h2>
      <pre id="todos">Loading...</pre>
    </section>
  </main>

  <script>
    async function load() {
      const [status, todos] = await Promise.all([
        fetch('/api/status').then(r => r.json()),
        fetch('/api/todos').then(r => r.json())
      ]);

      document.getElementById('status').textContent = JSON.stringify(status, null, 2);
      document.getElementById('todos').textContent = JSON.stringify(todos, null, 2);
    }

    document.getElementById('reload').addEventListener('click', load);
    load();
  </script>
</body>
</html>
