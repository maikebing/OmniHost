<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vue 3 SPA</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.76);
      --border: rgba(148, 163, 184, 0.14);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #42b883;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(66, 184, 131, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(53, 73, 94, 0.18), transparent 24%),
        linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      padding: 24px;
    }

    #app {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .task {
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.35);
    }

    .hero {
      padding: 24px;
      display: grid;
      gap: 14px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(66, 184, 131, 0.16);
      color: #86efac;
      font-size: .82rem;
      font-weight: 700;
    }

    h1, h2, p {
      margin: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #22c55e);
      color: #06251b;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .task {
      padding: 18px;
      display: grid;
      gap: 8px;
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="app">
    <section class="hero">
      <span class="eyebrow">Vue 3 SPA</span>
      <h1>SPA front-end, ASP.NET Core back-end.</h1>
      <p>
        This page uses Vue 3 on the client side and reads tasks from
        <code>/api/vue/tasks</code>. It is the lightweight SPA path for OmniHost.
      </p>
      <div class="actions">
        <button @click="load">Reload Tasks</button>
      </div>
    </section>

    <section class="list">
      <article class="task" v-for="task in tasks" :key="task.title">
        <span class="tag">{{ task.complete ? 'Done' : 'Next' }}</span>
        <h2>{{ task.title }}</h2>
        <p>{{ task.detail }}</p>
      </article>
    </section>
  </div>

  <script type="module">
    import { createApp } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.prod.js';

    createApp({
      data() {
        return {
          tasks: []
        };
      },
      methods: {
        async load() {
          const response = await fetch('/api/vue/tasks');
          this.tasks = await response.json();
        }
      },
      mounted() {
        this.load();
      }
    }).mount('#app');
  </script>
</body>
</html>
