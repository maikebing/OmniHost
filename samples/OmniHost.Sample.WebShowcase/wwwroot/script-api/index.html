<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>C# Script API</title>
  <style>
    :root {
      --bg: #111827;
      --card: rgba(255,255,255,0.92);
      --text: #111827;
      --muted: #6b7280;
      --accent: #8b5cf6;
      --border: rgba(139, 92, 246, 0.16);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.16), transparent 24%),
        linear-gradient(180deg, #0f172a 0%, var(--bg) 100%);
      padding: 24px;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .panel {
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.34);
      padding: 22px;
    }

    .hero {
      display: grid;
      gap: 12px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      color: var(--accent);
      font-weight: 700;
      font-size: .82rem;
    }

    h1, h2, p {
      margin: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
    }

    button {
      width: fit-content;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    pre {
      margin: 0;
      padding: 14px;
      border-radius: 16px;
      background: rgba(15,23,42,0.04);
      border: 1px solid rgba(15,23,42,0.06);
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: .82rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <span class="eyebrow">C# Script Backend</span>
      <h1>Use a `.csx` script to produce API responses.</h1>
      <p>
        This example uses Roslyn scripting so a backend response can be generated from a
        script file instead of a compiled controller action.
      </p>
      <button id="btn-reload">Reload Script Output</button>
    </section>

    <section class="panel">
      <h2>Script Output</h2>
      <pre id="output">Loading...</pre>
    </section>
  </main>

  <script>
    async function load() {
      const response = await fetch('/api/script/summary');
      const json = await response.json();
      document.getElementById('output').textContent = JSON.stringify(json, null, 2);
    }

    document.getElementById('btn-reload').addEventListener('click', load);
    load();
  </script>
</body>
</html>
