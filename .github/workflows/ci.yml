name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release

jobs:
  build-windows:
    name: Build Framework Packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore NativeWebHost.sln

      - name: Build
        shell: pwsh
        run: dotnet build NativeWebHost.sln -c $env:CONFIGURATION --no-restore -p:ContinuousIntegrationBuild=true

  build-samples:
    name: Build Samples
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Windows samples
        shell: pwsh
        run: |
          $projects = @(
            "samples\NativeWebHost.Sample.Basic\NativeWebHost.Sample.Basic.csproj",
            "samples\NativeWebHost.Sample.WindowStyles\NativeWebHost.Sample.WindowStyles.csproj",
            "samples\NativeWebHost.Sample.WebShowcase\NativeWebHost.Sample.WebShowcase.csproj",
            "samples\NativeWebHost.Sample.CrossPlatform\NativeWebHost.Sample.CrossPlatform.csproj"
          )

          foreach ($project in $projects) {
            dotnet build $project -c $env:CONFIGURATION -p:ContinuousIntegrationBuild=true
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Build Linux-compatible samples
        shell: pwsh
        run: |
          $projects = @(
            "samples\NativeWebHost.Sample.Gtk\NativeWebHost.Sample.Gtk.csproj",
            "samples\NativeWebHost.Sample.AotMinimalApi\NativeWebHost.Sample.AotMinimalApi.csproj"
          )

          foreach ($project in $projects) {
            dotnet build $project -c $env:CONFIGURATION -p:ContinuousIntegrationBuild=true
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
