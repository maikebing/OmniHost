name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: 8.0.x
  CONFIGURATION: Release

jobs:
  pack-nuget:
    name: Pack And Publish NuGet
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to resolve package version from tag '${env:GITHUB_REF_NAME}'."
          }

          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore solution
        shell: pwsh
        run: dotnet restore OmniHost.sln

      - name: Pack source projects
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          New-Item -ItemType Directory -Path artifacts\nuget -Force | Out-Null
          $projects = Get-ChildItem src -Recurse -Filter *.csproj | Sort-Object FullName

          foreach ($project in $projects) {
            dotnet pack $project.FullName `
              -c $env:CONFIGURATION `
              --no-restore `
              -o artifacts\nuget `
              -p:ContinuousIntegrationBuild=true `
              -p:Version=$env:PACKAGE_VERSION `
              -p:PackageVersion=$env:PACKAGE_VERSION

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Publish packages to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $packages = Get-ChildItem artifacts\nuget -Filter *.nupkg | Sort-Object Name
          if ($packages.Count -eq 0) {
            throw "No NuGet packages were produced."
          }

          foreach ($package in $packages) {
            dotnet nuget push $package.FullName `
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
              --api-key $env:GITHUB_TOKEN `
              --skip-duplicate

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  publish-samples-windows:
    name: Publish Windows Samples
    runs-on: windows-latest
    needs: pack-nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        shell: pwsh
        run: dotnet restore OmniHost.sln

      - name: Publish Windows sample artifacts
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ needs.pack-nuget.outputs.version }}
        run: |
          $samples = @(
            @{ Project = "samples\OmniHost.Sample.Basic\OmniHost.Sample.Basic.csproj"; Name = "OmniHost.Sample.Basic-windows" },
            @{ Project = "samples\OmniHost.Sample.WindowStyles\OmniHost.Sample.WindowStyles.csproj"; Name = "OmniHost.Sample.WindowStyles-windows" },
            @{ Project = "samples\OmniHost.Sample.WebShowcase\OmniHost.Sample.WebShowcase.csproj"; Name = "OmniHost.Sample.WebShowcase-windows" },
            @{ Project = "samples\OmniHost.Sample.CrossPlatform\OmniHost.Sample.CrossPlatform.csproj"; Name = "OmniHost.Sample.CrossPlatform-windows"; Framework = "net8.0-windows" }
          )

          New-Item -ItemType Directory -Path artifacts\release -Force | Out-Null

          foreach ($sample in $samples) {
            $publishDir = Join-Path "artifacts\publish" $sample.Name
            New-Item -ItemType Directory -Path $publishDir -Force | Out-Null

            $arguments = @(
              "publish", $sample.Project,
              "-c", $env:CONFIGURATION,
              "--no-restore",
              "-o", $publishDir,
              "-p:ContinuousIntegrationBuild=true",
              "-p:Version=$env:PACKAGE_VERSION"
            )

            if ($sample.ContainsKey("Framework")) {
              $arguments += @("-f", $sample.Framework)
            }

            dotnet @arguments
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $zipPath = Join-Path "artifacts\release" "$($sample.Name)-v$($env:PACKAGE_VERSION).zip"
            if (Test-Path $zipPath) {
              Remove-Item $zipPath -Force
            }

            Push-Location "artifacts\publish"
            try {
              Compress-Archive -Path $sample.Name -DestinationPath "..\release\$($sample.Name)-v$($env:PACKAGE_VERSION).zip"
            }
            finally {
              Pop-Location
            }
          }

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: sample-assets-windows
          path: artifacts/release/*.zip
          if-no-files-found: error

  publish-samples-linux:
    name: Publish Linux Samples
    runs-on: ubuntu-latest
    needs: pack-nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install NativeAOT prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore Linux sample projects
        shell: bash
        run: |
          set -euo pipefail
          projects=(
            "samples/OmniHost.Sample.Gtk/OmniHost.Sample.Gtk.csproj"
            "samples/OmniHost.Sample.AotMinimalApi/OmniHost.Sample.AotMinimalApi.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet restore "$project"
          done

          dotnet restore samples/OmniHost.Sample.CrossPlatform/OmniHost.Sample.CrossPlatform.csproj -p:TargetFramework=net8.0

      - name: Publish Linux sample artifacts
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.pack-nuget.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/release artifacts/publish

          publish_sample() {
            local project="$1"
            local asset_name="$2"
            local framework="${3:-}"
            local publish_dir="artifacts/publish/${asset_name}"

            mkdir -p "$publish_dir"

            if [[ -n "$framework" ]]; then
              dotnet publish "$project" \
                -c "$CONFIGURATION" \
                -f "$framework" \
                --no-restore \
                -o "$publish_dir" \
                -p:ContinuousIntegrationBuild=true \
                -p:Version="$PACKAGE_VERSION"
            else
              dotnet publish "$project" \
                -c "$CONFIGURATION" \
                --no-restore \
                -o "$publish_dir" \
                -p:ContinuousIntegrationBuild=true \
                -p:Version="$PACKAGE_VERSION"
            fi

            local zip_path="artifacts/release/${asset_name}-v${PACKAGE_VERSION}.zip"
            rm -f "$zip_path"
            (
              cd artifacts/publish
              zip -qr "../release/$(basename "$zip_path")" "$(basename "$publish_dir")"
            )
          }

          publish_sample "samples/OmniHost.Sample.Gtk/OmniHost.Sample.Gtk.csproj" "OmniHost.Sample.Gtk-linux"
          publish_sample "samples/OmniHost.Sample.CrossPlatform/OmniHost.Sample.CrossPlatform.csproj" "OmniHost.Sample.CrossPlatform-linux" "net8.0"
          publish_sample "samples/OmniHost.Sample.AotMinimalApi/OmniHost.Sample.AotMinimalApi.csproj" "OmniHost.Sample.AotMinimalApi-linux"

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: sample-assets-linux
          path: artifacts/release/*.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - pack-nuget
      - publish-samples-windows
      - publish-samples-linux

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts/downloaded

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ needs.pack-nuget.outputs.version }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          mapfile -t assets < <(find artifacts/downloaded -type f | sort)

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Release ${tag}

          Packages:
          - Published to GitHub Packages NuGet feed: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

          Download assets:
          - Source package artifacts (*.nupkg)
          - Windows sample bundles (*.zip)
          - Linux sample bundles (*.zip)
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" "${assets[@]}" --title "$tag" --notes-file "$notes_file"
          fi
